name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: Clearly describe the feature
      placeholder: What would you like to see added?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this could work

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, references, or examples